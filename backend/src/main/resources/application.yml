spring:
  profiles:
    active: local
  config:
    import:
      - optional:file:../.local-configs/application-local.yml
  application:
    name: paw-track-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:mysql://localhost:3306/campus_paw_track?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false&createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

ai:
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
